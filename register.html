<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .auth-box h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background-color: #2980b9; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .btn:hover { background-color: #3498db; }
        .link { text-align: center; margin-top: 15px; }
        .link a { color: #2980b9; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>Đăng Ký</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Tên đăng nhập:</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu:</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Số điện thoại:</label>
                <input type="text" id="phone" required>
            </div>
            <div class="form-group">
                <label>Vai trò:</label>
                <select id="role">
                    <option value="LESSEE">Người thuê phòng</option>
                    <option value="LESSOR">Chủ cho thuê</option>
                </select>
            </div>
            <button type="submit" class="btn">Đăng Ký</button>
        </form>
        <div class="link">
            Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value
            };

            try {
                const response = await fetch('http://localhost/api/auth.php?action=register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    alert('Đăng ký thành công! Hãy đăng nhập.');
                    window.location.href = 'login.html';
                } else {
                    alert('Lỗi: ' + result.message);
                }
            } catch (error) {
                alert('Lỗi kết nối đến máy chủ.');
            }
        });
    </script>
</body>
</html>
