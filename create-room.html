<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Phòng Cho Thuê</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        #map { height: 300px; border-radius: 4px; border: 1px solid #ccc; margin-top: 10px; z-index: 1;}
        .btn { width: 100%; padding: 12px; background-color: #e67e22; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 20px;}
        .btn:hover { background-color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Đăng Phòng Trọ Mới</h2>
        <form id="createRoomForm" enctype="multipart/form-data">
            <div class="grid-layout">
                <div>
                    <div class="form-group">
                        <label>Tiêu đề bài đăng:</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>Mô tả chi tiết phòng:</label>
                        <textarea id="description" rows="5" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Giá thuê (VNĐ/tháng):</label>
                        <input type="number" id="price" required>
                    </div>
                    <div class="form-group">
                        <label>Diện tích (m²):</label>
                        <input type="number" step="0.1" id="area" required>
                    </div>
                    <div class="form-group">
                        <label>Hình ảnh phòng trọ (Tối thiểu 3 ảnh):</label>
                        <input type="file" id="images" accept="image/*" multiple required>
                        <div id="imagePreviewContainer" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;"></div>
                    </div>
                </div>

                <div>
                    <div class="form-group">
                        <label>Địa chỉ hiển thị:</label>
                        <input type="text" id="address" required>
                    </div>
                    <div class="form-group">
                        <label>Ghim vị trí trên bản đồ:</label>
                        <div id="map"></div>
                        <input type="hidden" id="latitude">
                        <input type="hidden" id="longitude">
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn">Gửi Bài Đăng Trọ</button>
        </form>
    </div>

    <script>
        const userData = localStorage.getItem('user');
        let user = null;
        if (userData) {
            user = JSON.parse(userData);
            if (user.role !== 'LESSOR') {
                alert('Chỉ chủ trọ mới được truy cập trang này!');
                window.location.href = 'index.html';
            }
        } else {
            alert('Vui lòng đăng nhập trước!');
            window.location.href = 'login.html';
        }

        document.getElementById('images').addEventListener('change', function(e) {
            const files = e.target.files;
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = '';
            
            for(let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.width = '80px';
                    img.style.height = '80px';
                    img.style.objectFit = 'cover';
                    img.style.borderRadius = '4px';
                    container.appendChild(img);
                }
                reader.readAsDataURL(files[i]);
            }
        });

        const map = L.map('map').setView([21.0285, 105.8542], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            let marker = L.marker([21.0285, 105.8542], {draggable: true}).addTo(map);

            function updateLatLng(lat, lng) {
                document.getElementById('latitude').value = lat;
                document.getElementById('longitude').value = lng;
            }

            updateLatLng(21.0285, 105.8542);

            marker.on('dragend', function(e) {
                const position = marker.getLatLng();
                updateLatLng(position.lat, position.lng);
            });

            map.on('click', function(e) {
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;
                marker.setLatLng([lat, lng]);
                updateLatLng(lat, lng);
            });

            async function geocodeAddress(address) {
                if (address.length < 5) return;

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                    const data = await response.json();

                    if (data && data.length > 0) {
                        const lat = parseFloat(data[0].lat);
                        const lon = parseFloat(data[0].lon);

                        map.setView([lat, lon], 16);
                        marker.setLatLng([lat, lon]);
                        updateLatLng(lat, lon);
                    }
                } catch (error) {
                    console.error("Lỗi tìm kiếm địa chỉ:", error);
                }
            }

            let typingTimer;
            document.getElementById('address').addEventListener('input', function() {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    geocodeAddress(this.value);
                }, 1000); 
            });

        document.getElementById('createRoomForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fileInput = document.getElementById('images');
            if (fileInput.files.length < 3) {
                alert("Vui lòng tải lên ít nhất 3 hình ảnh!");
                return;
            }

            if (!document.getElementById('latitude').value) {
                alert("Vui lòng click vào bản đồ để chọn vị trí phòng trọ!");
                return;
            }

            const formData = new FormData();
            formData.append('lessor_id', user.id);
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value); // Dòng này cực kỳ quan trọng
            formData.append('price', document.getElementById('price').value);
            formData.append('area', document.getElementById('area').value);
            formData.append('address', document.getElementById('address').value);
            formData.append('latitude', document.getElementById('latitude').value);
            formData.append('longitude', document.getElementById('longitude').value);

            for(let i = 0; i < fileInput.files.length; i++) {
                formData.append('images[]', fileInput.files[i]);
            }

            try {
                const response = await fetch('http://localhost/api/rooms.php', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    alert(result.message);
                    window.location.href = 'index.html';
                } else {
                    alert('Lỗi: ' + result.message);
                }
            } catch (error) {
                alert('Lỗi kết nối đến máy chủ.');
            }
        });
    </script>
</body>
</html>
